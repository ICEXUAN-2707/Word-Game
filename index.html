<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fbf8f4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="单词卡">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>初中英语单词卡</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: rgba(31, 41, 51, .12);
      --paper: #fffdfa;
      --soft: #f4efe8;
      --accent: #e96565;
      --green: #3d9a77;
      --blue: #4e7da8;
      --shadow: 0 24px 70px rgba(40, 33, 28, .14);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; overflow: hidden; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, rgba(233, 101, 101, .10), transparent 28%),
        linear-gradient(145deg, #fbf8f4 0%, #eef4f2 48%, #f7f3ee 100%);
      letter-spacing: 0;
    }
    button, input, select { font: inherit; }
    button { border: 0; cursor: pointer; color: inherit; }
    .app { height: 100dvh; display: grid; grid-template-rows: auto 1fr; }
    .topbar {
      height: 64px; padding: 12px max(18px, env(safe-area-inset-left)) 10px max(18px, env(safe-area-inset-right));
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      backdrop-filter: blur(20px); background: rgba(255, 253, 250, .72); border-bottom: 1px solid var(--line);
      z-index: 10;
    }
    .brand { min-width: 0; }
    .brand b { display: block; font-size: 16px; line-height: 1.2; }
    .brand span { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .actions { display: flex; align-items: center; gap: 8px; }
    .iconbtn {
      width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,.82);
      border: 1px solid var(--line); display: grid; place-items: center; box-shadow: 0 8px 24px rgba(31,41,51,.08);
      transition: transform .18s ease, background .18s ease;
    }
    .iconbtn:active { transform: scale(.94); }
    .iconbtn.active { background: #ffe9e5; color: var(--accent); }
    .stage { position: relative; min-height: 0; overflow: hidden; }
    .deck {
      height: 100%; overflow-y: auto; scroll-snap-type: y mandatory; scrollbar-width: none;
      overscroll-behavior: contain; scroll-behavior: smooth;
    }
    .deck::-webkit-scrollbar { display: none; }
    .slide {
      height: calc(100dvh - 64px); scroll-snap-align: start; display: grid; place-items: center;
      padding: 22px 78px 28px 18px;
    }
    .card-wrap { perspective: 1200px; width: min(560px, 100%); aspect-ratio: 4 / 5.1; max-height: min(72dvh, 700px); }
    .card {
      position: relative; width: 100%; height: 100%; transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.2,.8,.2,1), filter .2s ease;
    }
    .card.flipped { transform: rotateY(180deg); }
    .face {
      position: absolute; inset: 0; backface-visibility: hidden; border-radius: 8px;
      background: rgba(255, 253, 250, .94); border: 1px solid rgba(31,41,51,.10); box-shadow: var(--shadow);
      padding: clamp(24px, 5vw, 44px); display: grid; grid-template-rows: auto 1fr auto; overflow: hidden;
    }
    .back { transform: rotateY(180deg); background: rgba(247, 251, 249, .96); }
    .meta { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font-size: 13px; }
    .word, .meaning { align-self: center; text-align: center; overflow-wrap: anywhere; }
    .word { font-size: clamp(34px, 9vw, 72px); font-weight: 780; line-height: 1.04; }
    .meaning { font-size: clamp(24px, 6vw, 44px); font-weight: 720; line-height: 1.18; }
    .hint { color: var(--muted); font-size: 13px; text-align: center; }
    .side {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      display: grid; gap: 12px; z-index: 5;
    }
    .side .iconbtn { background: rgba(255,253,250,.88); }
    .toast {
      position: absolute; left: 50%; top: 86px; transform: translate(-50%, -20px); opacity: 0; pointer-events: none;
      padding: 12px 16px; border-radius: 999px; background: rgba(31,41,51,.88); color: #fff;
      transition: transform .22s ease, opacity .22s ease; z-index: 30; font-size: 14px;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .forget {
      animation: forgetPulse .55s ease both;
    }
    @keyframes forgetPulse {
      0% { filter: none; transform: rotateY(180deg) scale(1); }
      45% { filter: saturate(1.3); transform: rotateY(180deg) scale(.97); }
      100% { filter: none; transform: rotateY(180deg) scale(1); }
    }
    .panel {
      position: fixed; inset: 0; z-index: 40; background: rgba(251,248,244,.96); backdrop-filter: blur(18px);
      transform: translateY(100%); transition: transform .34s cubic-bezier(.2,.8,.2,1);
      display: grid; grid-template-rows: auto auto 1fr; padding: 16px;
    }
    .panel.open { transform: translateY(0); }
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; max-width: 980px; width: 100%; margin: 0 auto; }
    .panel-head h2 { margin: 0; font-size: 22px; }
    .filters { max-width: 980px; width: 100%; margin: 14px auto; display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .filters input, .filters select {
      height: 44px; border-radius: 8px; border: 1px solid var(--line); background: #fff; padding: 0 12px; min-width: 0;
    }
    .word-list { max-width: 980px; width: 100%; margin: 0 auto; overflow: auto; padding-bottom: 22px; }
    .word-row {
      display: grid; grid-template-columns: minmax(110px, .8fr) minmax(140px, 1.1fr) auto; gap: 12px; align-items: center;
      min-height: 56px; padding: 11px 0; border-bottom: 1px solid var(--line);
    }
    .word-row b { overflow-wrap: anywhere; }
    .word-row span { color: var(--muted); overflow-wrap: anywhere; }
    .pill { border-radius: 999px; padding: 7px 10px; background: #fff; border: 1px solid var(--line); white-space: nowrap; }
    .tutorial {
      position: fixed; inset: 0; z-index: 60; display: grid; place-items: center; padding: 18px;
      background: rgba(31,41,51,.20); backdrop-filter: blur(18px);
    }
    .tutorial-card {
      width: min(430px, 100%); border-radius: 8px; background: var(--paper); box-shadow: var(--shadow);
      border: 1px solid var(--line); padding: 26px;
    }
    .tutorial-card h1 { margin: 0 0 8px; font-size: 26px; }
    .tutorial-card p { margin: 0; color: var(--muted); line-height: 1.7; }
    .tutorial-card .steps { display: grid; gap: 10px; margin: 22px 0; }
    .step { display: grid; grid-template-columns: 34px 1fr; gap: 10px; align-items: start; }
    .num { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; background: var(--soft); font-weight: 800; }
    .primary { width: 100%; height: 48px; border-radius: 8px; background: var(--ink); color: white; font-weight: 750; }
    @media (max-width: 640px) {
      .slide { padding: 18px 68px 24px 14px; }
      .topbar { height: 60px; }
      .card-wrap { aspect-ratio: 3 / 4.3; max-height: 68dvh; }
      .side { right: 10px; gap: 10px; }
      .iconbtn { width: 40px; height: 40px; }
      .word-row { grid-template-columns: 1fr auto; }
      .word-row span { grid-column: 1 / -1; }
      .filters { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <b>初中英语单词卡</b>
        <span id="stats">加载中</span>
      </div>
      <div class="actions">
        <button class="iconbtn" id="shuffleBtn" title="打乱">↝</button>
        <button class="iconbtn" id="allBtn" title="查看所有单词">☰</button>
        <button class="iconbtn" id="helpBtn" title="教程">?</button>
      </div>
    </header>
    <main class="stage">
      <div class="toast" id="toast"></div>
      <div class="deck" id="deck" aria-live="polite"></div>
      <div class="side">
        <button class="iconbtn" id="favBtn" title="加入重点单词本">☆</button>
        <button class="iconbtn" id="knownBtn" title="认识">✓</button>
        <button class="iconbtn" id="forgetBtn" title="忘记了">!</button>
        <button class="iconbtn" id="prevBtn" title="上一个">↑</button>
        <button class="iconbtn" id="nextBtn" title="下一个">↓</button>
      </div>
    </main>
  </div>

  <section class="panel" id="panel" aria-hidden="true">
    <div class="panel-head">
      <h2>所有单词</h2>
      <button class="iconbtn" id="closePanel" title="关闭">×</button>
    </div>
    <div class="filters">
      <input id="search" placeholder="搜索英文 / 中文 / Unit">
      <select id="bookFilter"></select>
    </div>
    <div class="word-list" id="wordList"></div>
  </section>

  <section class="tutorial" id="tutorial">
    <div class="tutorial-card">
      <h1>先过一遍手势</h1>
      <p>像刷短视频一样学习，每个词会在队列中出现 5 遍。</p>
      <div class="steps">
        <div class="step"><div class="num">1</div><p>点击卡片翻面，先看英文，再看中文。</p></div>
        <div class="step"><div class="num">2</div><p>翻面后双击卡片，记录“忘记了”，页面会给出动画提示。</p></div>
        <div class="step"><div class="num">3</div><p>向下滑到下一个词，点星标加入重点单词本。</p></div>
      </div>
      <button class="primary" id="startBtn">开始背词</button>
    </div>
  </section>

    const repeatTimes = 5;
    const store = {
      fav: new Set(JSON.parse(localStorage.getItem('wordcard:fav') || '[]')),
      forgot: JSON.parse(localStorage.getItem('wordcard:forgot') || '{}'),
      tutorial: localStorage.getItem('wordcard:tutorial') === 'done'
    };
    const els = {
      deck: document.getElementById('deck'),
      stats: document.getElementById('stats'),
      toast: document.getElementById('toast'),
      fav: document.getElementById('favBtn'),
      panel: document.getElementById('panel'),
      wordList: document.getElementById('wordList'),
      search: document.getElementById('search'),
      bookFilter: document.getElementById('bookFilter'),
      tutorial: document.getElementById('tutorial')
    };
    let deck = [];
    let current = 0;
    let toastTimer = 0;

    function shuffle(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildDeck(random = false) {
      const base = [];
      for (let round = 1; round <= repeatTimes; round++) {
        for (const word of WORDS) base.push({...word, round});
      }
      deck = random ? shuffle(base) : base;
      current = 0;
      renderDeck();
      updateStats();
    }

    function renderDeck() {
      els.deck.innerHTML = deck.map((word, index) => `
        <section class="slide" data-index="${index}">
          <div class="card-wrap">
            <article class="card" data-id="${word.id}">
              <div class="face front">
                <div class="meta"><span>${word.book.replace('人教版','')}</span><span>${word.sheet} · ${word.round}/${repeatTimes}</span></div>
                <div class="word">${escapeHtml(word.english)}</div>
                <div class="hint">点击翻牌</div>
              </div>
              <div class="face back">
                <div class="meta"><span>${word.book.replace('人教版','')}</span><span>双击：忘记了</span></div>
                <div class="meaning">${escapeHtml(word.chinese)}</div>
                <div class="hint">${escapeHtml(word.english)}</div>
              </div>
            </article>
          </div>
        </section>`).join('');
      els.deck.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => card.classList.toggle('flipped'));
        card.addEventListener('dblclick', event => {
          event.preventDefault();
          if (card.classList.contains('flipped')) markForgot(card.dataset.id, card);
        });
      });
      els.deck.scrollTop = 0;
      setTimeout(syncCurrent, 50);
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }

    function syncCurrent() {
      const top = els.deck.scrollTop;
      const h = els.deck.clientHeight || 1;
      current = Math.min(deck.length - 1, Math.max(0, Math.round(top / h)));
      updateStats();
    }

    function go(delta) {
      const next = Math.min(deck.length - 1, Math.max(0, current + delta));
      els.deck.scrollTo({ top: next * els.deck.clientHeight, behavior: 'smooth' });
    }

    function currentWord() { return deck[current] || WORDS[0]; }

    function updateStats() {
      const word = currentWord();
      els.stats.textContent = `${current + 1} / ${deck.length} · ${WORDS.length} 词 · 重点 ${store.fav.size}`;
      els.fav.classList.toggle('active', store.fav.has(word.id));
      els.fav.textContent = store.fav.has(word.id) ? '★' : '☆';
    }

    function persist() {
      localStorage.setItem('wordcard:fav', JSON.stringify([...store.fav]));
      localStorage.setItem('wordcard:forgot', JSON.stringify(store.forgot));
    }

    function showToast(text) {
      clearTimeout(toastTimer);
      els.toast.textContent = text;
      els.toast.classList.add('show');
      toastTimer = setTimeout(() => els.toast.classList.remove('show'), 1100);
    }

    function toggleFav() {
      const word = currentWord();
      if (store.fav.has(word.id)) {
        store.fav.delete(word.id);
        showToast('已移出重点单词本');
      } else {
        store.fav.add(word.id);
        showToast('已加入重点单词本');
      }
      persist();
      updateStats();
      renderWordList();
    }

    function markForgot(id, card) {
      store.forgot[id] = (store.forgot[id] || 0) + 1;
      persist();
      card.classList.remove('forget');
      void card.offsetWidth;
      card.classList.add('forget');
      showToast('已记录：忘记了');
      renderWordList();
    }

    function markCurrentForgot() {
      const card = els.deck.querySelector(`.slide[data-index="${current}"] .card`);
      if (card) {
        card.classList.add('flipped');
        markForgot(currentWord().id, card);
      }
    }

    function setupList() {
      const books = [...new Set(WORDS.map(w => w.book))];
      els.bookFilter.innerHTML = '<option value="">全部教材</option><option value="fav">重点单词本</option>' + books.map(book => `<option value="${escapeHtml(book)}">${escapeHtml(book.replace('人教版',''))}</option>`).join('');
      els.search.addEventListener('input', renderWordList);
      els.bookFilter.addEventListener('change', renderWordList);
      renderWordList();
    }

    function renderWordList() {
      const q = els.search.value.trim().toLowerCase();
      const book = els.bookFilter.value;
      const items = WORDS.filter(word => {
        if (book === 'fav' && !store.fav.has(word.id)) return false;
        if (book && book !== 'fav' && word.book !== book) return false;
        if (!q) return true;
        return `${word.english} ${word.chinese} ${word.sheet}`.toLowerCase().includes(q);
      });
      els.wordList.innerHTML = items.map(word => `
        <div class="word-row">
          <b>${escapeHtml(word.english)}</b>
          <span>${escapeHtml(word.chinese)} · ${escapeHtml(word.sheet)}</span>
          <button class="pill" data-fav="${word.id}">${store.fav.has(word.id) ? '★ 重点' : '☆ 加重点'}</button>
        </div>`).join('') || '<p>没有匹配的单词。</p>';
      els.wordList.querySelectorAll('[data-fav]').forEach(btn => btn.addEventListener('click', () => {
        const id = btn.dataset.fav;
        store.fav.has(id) ? store.fav.delete(id) : store.fav.add(id);
        persist();
        updateStats();
        renderWordList();
      }));
    }

    els.deck.addEventListener('scroll', () => requestAnimationFrame(syncCurrent), { passive: true });
    document.getElementById('nextBtn').addEventListener('click', () => go(1));
    document.getElementById('prevBtn').addEventListener('click', () => go(-1));
    document.getElementById('favBtn').addEventListener('click', toggleFav);
    document.getElementById('forgetBtn').addEventListener('click', markCurrentForgot);
    document.getElementById('knownBtn').addEventListener('click', () => { showToast('继续保持'); go(1); });
    document.getElementById('shuffleBtn').addEventListener('click', () => { buildDeck(true); showToast('已打乱学习队列'); });
    document.getElementById('allBtn').addEventListener('click', () => { els.panel.classList.add('open'); els.panel.setAttribute('aria-hidden', 'false'); });
    document.getElementById('closePanel').addEventListener('click', () => { els.panel.classList.remove('open'); els.panel.setAttribute('aria-hidden', 'true'); });
    document.getElementById('helpBtn').addEventListener('click', () => els.tutorial.style.display = 'grid');
    document.getElementById('startBtn').addEventListener('click', () => {
      store.tutorial = true;
      localStorage.setItem('wordcard:tutorial', 'done');
      els.tutorial.style.display = 'none';
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'ArrowDown' || event.key === 'PageDown') go(1);
      if (event.key === 'ArrowUp' || event.key === 'PageUp') go(-1);
      if (event.key === ' ') {
        event.preventDefault();
        const card = els.deck.querySelector(`.slide[data-index="${current}"] .card`);
        if (card) card.classList.toggle('flipped');
      }
      if (event.key.toLowerCase() === 'f') toggleFav();
    });

    buildDeck(false);
    setupList();
    if (store.tutorial) els.tutorial.style.display = 'none';
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
